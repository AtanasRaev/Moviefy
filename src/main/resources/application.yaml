spring:
  session:
    store-type: none

  data:
    redis:
      url: ${REDIS_URL}
      repositories:
        enabled: false

  task:
    scheduling:
      pool:
        size: 10

  flyway:
    baseline-on-migrate: true
    baseline-version: 0

  jpa:
    properties:
      hibernate:
        format_sql: 'TRUE'
    hibernate:
      ddl-auto: validate
    open-in-view: 'false'

  sql:
    init:
      mode: never

  mvc:
    hiddenmethod:
      filter:
        enabled: 'true'

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      max-lifetime: 240000
      idle-timeout: 60000
      keepalive-time: 30000

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  servlet:
    session:
      timeout: 7d
      cookie:
        max-age: 7d
        http-only: true
        secure: true